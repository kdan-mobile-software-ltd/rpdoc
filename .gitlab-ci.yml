include:
  - project: "kdanmobile/deployment/cluster-cicd-config"
    ref: master
    file: "/gitlab-ci/node-brakeman-sast-upload.yaml"

stages:
  - test
  - sast_upload
  - lint
  - rspec
  - publish

rubocop:
  stage: lint
  image: ruby:3.4.8
  tags:
    - arm64
  script:
    - bundle install
    - bundle exec rubocop
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

rspec:
  stage: rspec
  image: ruby:3.4.8
  tags:
    - arm64
  script:
    - bundle install
    - RPDOC_ENABLE=false bundle exec rspec spec
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

to_gem:
  stage: publish
  image: ruby:3.4.8
  tags:
    - arm64
  script:
    - mkdir -p ~/.gem
    - touch ~/.gem/credentials
    - chmod 0600 ~/.gem/credentials
    - 'printf -- "---\n:rubygems_api_key: $GEM_HOST_API_KEY\n" > ~/.gem/credentials'
    - RELEASE_VERSION=$(ruby -e 'require_relative "./lib/rpdoc/version"; puts Rpdoc::VERSION')
    - GEM_NAME=rpdoc-$RELEASE_VERSION.gem
    - gem build rpdoc.gemspec
    - gem push $GEM_NAME
  rules:
    - if: '$CI_COMMIT_TAG =~ /^release-\d+\.\d+\.\d+(\.\d+)?$/'
